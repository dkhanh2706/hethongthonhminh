<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống thông minh hỗ trợ học tập</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 500px;
        width: 100%;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 28px;
        color: #333;
        margin-bottom: 10px;
      }

      .header .emoji {
        font-size: 32px;
        margin-right: 10px;
      }

      .subtitle {
        font-size: 14px;
        color: #666;
        margin-top: 5px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 16px;
        transition: border-color 0.3s ease;
        font-family: inherit;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .form-group input:invalid {
        border-color: #ff6b6b;
      }

      .error-message {
        color: #ff6b6b;
        font-size: 12px;
        margin-top: 5px;
        display: none;
      }

      .form-group input:invalid ~ .error-message {
        display: block;
      }

      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        margin-top: 10px;
      }

      button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      button:active:not(:disabled) {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .result-section {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 2px solid #e0e0e0;
      }

      .result-section h3 {
        color: #333;
        margin-bottom: 15px;
        font-size: 16px;
      }

      .result-box {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 14px;
      }

      .result-box.success {
        background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
        color: #2d5016;
        font-weight: 600;
      }

      .result-box.error {
        background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        color: #721c24;
        font-weight: 600;
      }

      .loading {
        display: none;
        text-align: center;
      }

      .spinner {
        border: 3px solid rgba(102, 126, 234, 0.1);
        border-radius: 50%;
        border-top: 3px solid #667eea;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        display: inline-block;
        margin-right: 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 480px) {
        .container {
          padding: 25px;
        }

        .header h1 {
          font-size: 22px;
        }

        .header .emoji {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1><span class="emoji">📚</span>Hệ thống hỗ trợ học tập thông minh</h1>
        <p class="subtitle">Nhập thông tin để nhận gợi ý câu hỏi phù hợp</p>
      </div>

      <form id="form" onsubmit="send(event)">
        <div class="form-group">
          <label for="score">Điểm bài tập gần nhất (0-100)</label>
          <input
            id="score"
            type="number"
            min="0"
            max="100"
            placeholder="Ví dụ: 85"
            required
            aria-label="Điểm bài tập"
          />
          <span class="error-message">Vui lòng nhập điểm từ 0 đến 100</span>
        </div>

        <div class="form-group">
          <label for="time">Thời gian học (phút)</label>
          <input
            id="time"
            type="number"
            min="1"
            placeholder="Ví dụ: 45"
            required
            aria-label="Thời gian học"
          />
          <span class="error-message"
            >Vui lòng nhập thời gian học (tối thiểu 1 phút)</span
          >
        </div>

        <button type="submit" id="submitBtn">Gợi ý câu hỏi</button>
      </form>

      <div class="result-section">
        <h3>Kết quả gợi ý:</h3>
        <div id="result" class="result-box">Câu hỏi sẽ hiển thị ở đây</div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
