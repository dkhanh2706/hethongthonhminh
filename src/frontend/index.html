<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduSmart - Hệ thống hỗ trợ học tập thông minh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --primary-light: #818cf8;
        --accent: #a78bfa;
        --bg-start: #0f0c29;
        --bg-mid: #302b63;
        --bg-end: #24243e;
        --card-bg: rgba(255, 255, 255, 0.07);
        --card-border: rgba(255, 255, 255, 0.12);
        --input-bg: rgba(255, 255, 255, 0.06);
        --input-border: rgba(255, 255, 255, 0.1);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --success: #34d399;
        --error: #f87171;
        --warning: #fbbf24;
        --radius: 14px;
        --radius-sm: 10px;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px;
        position: relative;
      }

      .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
      .bg-orbs .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 20s ease-in-out infinite; }
      .bg-orbs .orb:nth-child(1) { width: 500px; height: 500px; background: radial-gradient(circle, #6366f1, transparent 70%); top: -10%; left: -10%; }
      .bg-orbs .orb:nth-child(2) { width: 400px; height: 400px; background: radial-gradient(circle, #a78bfa, transparent 70%); bottom: -10%; right: -10%; animation-delay: -7s; animation-duration: 25s; }
      .bg-orbs .orb:nth-child(3) { width: 300px; height: 300px; background: radial-gradient(circle, #818cf8, transparent 70%); top: 50%; left: 60%; animation-delay: -14s; animation-duration: 22s; }

      @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 25% { transform: translate(40px, -30px) scale(1.05); } 50% { transform: translate(-20px, 20px) scale(0.95); } 75% { transform: translate(30px, 40px) scale(1.02); } }

      .card {
        position: relative; z-index: 1;
        background: var(--card-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 44px 40px;
        max-width: 680px;
        width: 100%;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.06);
        animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

      .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--card-border); }
      .top-bar .brand { display: flex; align-items: center; gap: 10px; }
      .brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
      .brand-icon svg { width: 20px; height: 20px; fill: white; }
      .brand-name { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }

      .user-info { display: flex; align-items: center; gap: 14px; }
      .user-badge { display: flex; align-items: center; gap: 8px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 20px; padding: 6px 14px 6px 10px; }
      .avatar { width: 28px; height: 28px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; }
      .user-badge span { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
      .btn-logout { padding: 7px 16px; background: rgba(248, 113, 113, 0.12); border: 1px solid rgba(248, 113, 113, 0.2); color: var(--error); border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; font-family: inherit; display: flex; align-items: center; gap: 6px; }
      .btn-logout svg { width: 14px; height: 14px; }
      .btn-logout:hover { background: rgba(248, 113, 113, 0.2); border-color: rgba(248, 113, 113, 0.4); }

      .header { text-align: center; margin-bottom: 32px; }
      .header h1 { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; letter-spacing: -0.5px; }
      .header p { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }

      .form-group { margin-bottom: 22px; }
      .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 500; font-size: 13px; letter-spacing: 0.2px; }
      .input-wrap { position: relative; display: flex; align-items: center; }
      .input-icon { position: absolute; left: 14px; width: 18px; height: 18px; color: var(--text-muted); pointer-events: none; transition: color 0.2s; z-index: 2; }
      .input-wrap input { width: 100%; padding: 13px 14px 13px 44px; background: var(--input-bg); border: 1.5px solid var(--input-border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text-primary); font-family: inherit; transition: all 0.25s ease; outline: none; }
      .input-wrap input::placeholder { color: var(--text-muted); }
      .input-wrap input:focus { border-color: var(--primary); background: rgba(99, 102, 241, 0.06); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
      .input-wrap input:focus ~ .input-icon { color: var(--primary-light); }
      .input-suffix { position: absolute; right: 14px; font-size: 12px; color: var(--text-muted); pointer-events: none; z-index: 2; }

      .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.25s ease; margin-top: 8px; letter-spacing: 0.2px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 8px; }
      .btn-primary svg { width: 18px; height: 18px; }
      .btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1)); opacity: 0; transition: opacity 0.25s; }
      .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4); }
      .btn-primary:hover:not(:disabled)::before { opacity: 1; }
      .btn-primary:active:not(:disabled) { transform: translateY(0); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

      .result-section { margin-top: 28px; padding-top: 28px; border-top: 1px solid var(--card-border); }
      .result-section h3 { color: var(--text-secondary); margin-bottom: 14px; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }

      .result-box { background: var(--input-bg); border: 1.5px solid var(--input-border); padding: 24px; border-radius: var(--radius-sm); text-align: center; min-height: 72px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; transition: all 0.4s ease; flex-direction: column; }
      .result-box.success { background: rgba(52, 211, 153, 0.08); border-color: rgba(52, 211, 153, 0.25); color: var(--text-primary); text-align: left; align-items: stretch; }
      .result-box.error { background: rgba(248, 113, 113, 0.08); border-color: rgba(248, 113, 113, 0.25); color: var(--error); font-weight: 500; text-align: center; align-items: center; }
      .result-box.loading { color: var(--primary-light); border-color: rgba(99, 102, 241, 0.2); background: rgba(99, 102, 241, 0.06); text-align: center; align-items: center; }

      .spinner-ring { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .result-spinner { width: 22px; height: 22px; border: 2.5px solid rgba(99, 102, 241, 0.15); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; margin-right: 10px; }

      .toast { position: fixed; top: 24px; right: 24px; padding: 14px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; z-index: 100; display: flex; align-items: center; gap: 10px; animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3); max-width: 380px; }
      .toast.error { background: rgba(248, 113, 113, 0.15); border: 1px solid rgba(248, 113, 113, 0.3); color: var(--error); backdrop-filter: blur(12px); }
      .toast.success { background: rgba(52, 211, 153, 0.15); border: 1px solid rgba(52, 211, 153, 0.3); color: var(--success); backdrop-filter: blur(12px); }
      .toast svg { width: 18px; height: 18px; flex-shrink: 0; }
      .toast.hide { animation: toastOut 0.3s ease forwards; }
      @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

      .result-content { width: 100%; }
      .result-main { font-size: 18px; margin-bottom: 12px; font-weight: 600; }
      .result-meta { margin-bottom: 12px; }
      .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
      .topic-badge { background: rgba(99, 102, 241, 0.15); color: var(--primary-light); border: 1px solid rgba(99, 102, 241, 0.25); }
      .result-reasoning { padding: 12px; background: rgba(255,255,255,0.04); border-radius: 8px; margin-bottom: 12px; font-size: 13px; line-height: 1.5; color: var(--text-secondary); }
      .result-strategy { padding: 16px; background: rgba(99, 102, 241, 0.06); border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 8px; }
      .result-strategy h4 { color: var(--primary-light); margin-bottom: 6px; font-size: 14px; }
      .result-strategy p { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; line-height: 1.5; }
      .result-strategy ul { padding-left: 18px; }
      .result-strategy li { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; line-height: 1.4; }

      .adaptive-content { width: 100%; }
      .dashboard-content { width: 100%; }

      .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
      .summary-card { background: rgba(255,255,255,0.04); border: 1px solid var(--input-border); border-radius: 10px; padding: 14px 10px; text-align: center; }
      .summary-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
      .summary-value { font-size: 18px; font-weight: 700; color: var(--text-primary); }
      .summary-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
      .level-value { color: var(--primary-light); }
      .weak-value { color: var(--error); }
      .strong-value { color: var(--success); }
      .trend-up { color: var(--success); }
      .trend-down { color: var(--error); }
      .trend-stable { color: var(--warning); }

      .rec-section { margin-top: 16px; }
      .rec-section h4 { color: var(--text-secondary); font-size: 13px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; margin-bottom: 10px; }
      .rec-card { background: rgba(255,255,255,0.04); border: 1px solid var(--input-border); border-radius: 10px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--input-border); }
      .rec-card.priority-high { border-left-color: var(--error); }
      .rec-card.priority-medium { border-left-color: var(--warning); }
      .rec-card.priority-low { border-left-color: var(--success); }
      .rec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      .rec-topic { font-size: 12px; color: var(--primary-light); font-weight: 500; }
      .rec-difficulty { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 4px; }
      .rec-content { font-size: 14px; color: var(--text-primary); margin-bottom: 8px; line-height: 1.4; }
      .rec-reason { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-style: italic; }
      .rec-time { font-size: 11px; color: var(--text-muted); }

      .strategy-section { margin-top: 16px; padding: 16px; background: rgba(99, 102, 241, 0.06); border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 10px; }
      .strategy-section h4 { color: var(--primary-light); font-size: 13px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; margin-bottom: 8px; }
      .strategy-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
      .strategy-section p { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }
      .strategy-tips { padding-left: 18px; }
      .strategy-tips li { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; line-height: 1.4; }

      @media (max-width: 540px) {
        .card { padding: 28px 22px; border-radius: 16px; }
        .header h1 { font-size: 22px; }
        .top-bar { flex-direction: column; gap: 12px; align-items: flex-start; }
        .user-info { width: 100%; justify-content: space-between; }
        .toast { right: 12px; left: 12px; max-width: none; }
        .summary-grid { grid-template-columns: repeat(2, 1fr); }
      }
    </style>
  </head>
  <body>
    <div class="bg-orbs">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>

    <div id="toast"></div>

    <div class="card">
      <div class="top-bar">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
          </div>
          <span class="brand-name">EduSmart</span>
        </div>
        <div class="user-info">
          <div class="user-badge">
            <div class="avatar" id="avatarInitial">U</div>
            <span id="welcomeUser">User</span>
          </div>
          <button type="button" class="btn-logout" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Đăng xuất
          </button>
        </div>
      </div>

      <div class="header">
        <h1>Hỗ trợ học tập thông minh</h1>
        <p>Nhập thông tin để nhận gợi ý câu hỏi phù hợp với trình độ</p>
      </div>

      <form id="form" onsubmit="send(event)">
        <div class="form-group">
          <label for="score">Điểm bài tập gần nhất</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <input id="score" type="number" min="0" max="100" placeholder="Ví dụ: 85" required aria-label="Điểm bài tập" />
            <span class="input-suffix">/ 100</span>
          </div>
        </div>

        <div class="form-group">
          <label for="time">Thời gian học</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <input id="time" type="number" min="1" placeholder="Ví dụ: 45" required aria-label="Thời gian học" />
            <span class="input-suffix">phút</span>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Phân tích & Gợi ý
        </button>
      </form>

      <div class="result-section">
        <h3>Kết quả phân tích</h3>
        <div id="result" class="result-box">Kết quả phân tích sẽ hiển thị ở đây</div>
      </div>

      <div class="result-section">
        <h3>Gợi ý cá nhân hóa</h3>
        <div id="adaptiveResult" class="result-box">Gợi ý câu hỏi sẽ hiển thị sau khi phân tích</div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
