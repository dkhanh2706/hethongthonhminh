<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - EduSmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        margin: 0; padding: 0; box-sizing: border-box;
      }

      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --primary-light: #818cf8;
        --accent: #a78bfa;
        --bg-start: #0f0c29;
        --bg-mid: #302b63;
        --bg-end: #24243e;
        --card-bg: rgba(255, 255, 255, 0.07);
        --card-border: rgba(255, 255, 255, 0.12);
        --input-bg: rgba(255, 255, 255, 0.06);
        --input-border: rgba(255, 255, 255, 0.1);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --success: #34d399;
        --error: #f87171;
        --radius: 14px;
        --radius-sm: 10px;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
      }

      .bg-orbs {
        position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
      }

      .bg-orbs .orb {
        position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
        animation: float 20s ease-in-out infinite;
      }

      .bg-orbs .orb:nth-child(1) {
        width: 500px; height: 500px;
        background: radial-gradient(circle, #6366f1, transparent 70%);
        top: -10%; left: -10%;
      }

      .bg-orbs .orb:nth-child(2) {
        width: 400px; height: 400px;
        background: radial-gradient(circle, #a78bfa, transparent 70%);
        bottom: -10%; right: -10%;
        animation-delay: -7s; animation-duration: 25s;
      }

      .bg-orbs .orb:nth-child(3) {
        width: 300px; height: 300px;
        background: radial-gradient(circle, #818cf8, transparent 70%);
        top: 50%; left: 60%;
        animation-delay: -14s; animation-duration: 22s;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(40px, -30px) scale(1.05); }
        50% { transform: translate(-20px, 20px) scale(0.95); }
        75% { transform: translate(30px, 40px) scale(1.02); }
      }

      .card {
        position: relative; z-index: 1;
        background: var(--card-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 44px 40px;
        max-width: 460px;
        width: 100%;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.06);
        animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes cardIn {
        from { opacity: 0; transform: translateY(30px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .brand {
        display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px;
      }

      .brand-icon {
        width: 40px; height: 40px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      }

      .brand-icon svg { width: 22px; height: 22px; fill: white; }
      .brand-name { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }

      .header { text-align: center; margin-bottom: 28px; }

      .header h1 {
        font-size: 26px; font-weight: 700; color: var(--text-primary);
        margin-bottom: 8px; letter-spacing: -0.5px;
      }

      .header p { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }

      .strength-bar {
        height: 4px; border-radius: 2px; background: var(--input-border);
        margin-top: 8px; overflow: hidden;
      }

      .strength-bar .fill {
        height: 100%; border-radius: 2px; transition: all 0.3s ease; width: 0;
      }

      .strength-text {
        font-size: 11px; margin-top: 4px; color: var(--text-muted);
        transition: color 0.3s;
      }

      .form-group { margin-bottom: 20px; position: relative; }

      .form-group label {
        display: block; margin-bottom: 8px; color: var(--text-secondary);
        font-weight: 500; font-size: 13px; letter-spacing: 0.2px;
      }

      .input-wrap {
        position: relative; display: flex; align-items: center;
      }

      .input-icon {
        position: absolute; left: 14px; width: 18px; height: 18px;
        color: var(--text-muted); pointer-events: none; transition: color 0.2s; z-index: 2;
      }

      .input-wrap input {
        width: 100%; padding: 13px 14px 13px 44px;
        background: var(--input-bg); border: 1.5px solid var(--input-border);
        border-radius: var(--radius-sm); font-size: 15px; color: var(--text-primary);
        font-family: inherit; transition: all 0.25s ease; outline: none;
      }

      .input-wrap input::placeholder { color: var(--text-muted); }

      .input-wrap input:focus {
        border-color: var(--primary); background: rgba(99, 102, 241, 0.06);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }

      .input-wrap input:focus ~ .input-icon { color: var(--primary-light); }

      .toggle-pw {
        position: absolute; right: 12px; background: none; border: none;
        cursor: pointer; color: var(--text-muted); padding: 4px;
        display: flex; align-items: center; justify-content: center;
        transition: color 0.2s; z-index: 2; width: auto; margin: 0;
      }

      .toggle-pw:hover { color: var(--text-secondary); transform: none; box-shadow: none; }
      .toggle-pw svg { width: 18px; height: 18px; }

      .hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

      .btn-primary {
        width: 100%; padding: 14px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white; border: none; border-radius: var(--radius-sm);
        font-size: 15px; font-weight: 600; cursor: pointer;
        transition: all 0.25s ease; margin-top: 8px;
        letter-spacing: 0.2px; position: relative; overflow: hidden;
      }

      .btn-primary::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
        opacity: 0; transition: opacity 0.25s;
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
      }

      .btn-primary:hover:not(:disabled)::before { opacity: 1; }
      .btn-primary:active:not(:disabled) { transform: translateY(0); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

      .divider {
        display: flex; align-items: center; margin: 24px 0; gap: 12px;
      }

      .divider::before, .divider::after {
        content: ''; flex: 1; height: 1px; background: var(--card-border);
      }

      .divider span { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

      .links { text-align: center; }

      .links a {
        color: var(--primary-light); text-decoration: none;
        font-size: 14px; font-weight: 500; transition: color 0.2s;
      }

      .links a:hover { color: var(--accent); }

      .toast {
        position: fixed; top: 24px; right: 24px;
        padding: 14px 20px; border-radius: var(--radius-sm);
        font-size: 14px; font-weight: 500; z-index: 100;
        display: flex; align-items: center; gap: 10px;
        animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3); max-width: 380px;
      }

      .toast.error {
        background: rgba(248, 113, 113, 0.15); border: 1px solid rgba(248, 113, 113, 0.3);
        color: var(--error); backdrop-filter: blur(12px);
      }

      .toast.success {
        background: rgba(52, 211, 153, 0.15); border: 1px solid rgba(52, 211, 153, 0.3);
        color: var(--success); backdrop-filter: blur(12px);
      }

      .toast svg { width: 18px; height: 18px; flex-shrink: 0; }
      .toast.hide { animation: toastOut 0.3s ease forwards; }

      @keyframes toastIn {
        from { opacity: 0; transform: translateX(40px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes toastOut {
        to { opacity: 0; transform: translateX(40px); }
      }

      .spinner-ring {
        width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white; border-radius: 50%;
        animation: spin 0.7s linear infinite; display: inline-block;
        vertical-align: middle; margin-right: 8px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .check-icon {
        width: 16px; height: 16px; position: absolute; right: 40px;
        color: var(--success); opacity: 0; transition: opacity 0.2s; z-index: 2;
      }

      .check-icon.show { opacity: 1; }

      @media (max-width: 480px) {
        .card { padding: 32px 24px; border-radius: 16px; }
        .header h1 { font-size: 22px; }
        .toast { right: 12px; left: 12px; max-width: none; }
      }
    </style>
  </head>
  <body>
    <div class="bg-orbs">
      <div class="orb"></div>
      <div class="orb"></div>
      <div class="orb"></div>
    </div>

    <div class="card">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
        </div>
        <span class="brand-name">EduSmart</span>
      </div>

      <div class="header">
        <h1>Tạo tài khoản</h1>
        <p>Bắt đầu hành trình học tập của bạn</p>
      </div>

      <div id="toast"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="username" type="text" placeholder="Tối thiểu 3 ký tự" required minlength="3" autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input id="email" type="email" placeholder="email@example.com" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="password" type="password" placeholder="Tối thiểu 6 ký tự" required minlength="6" autocomplete="new-password" oninput="checkStrength(this.value)" />
            <button type="button" class="toggle-pw" onclick="togglePw('password', this)" tabindex="-1">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
          <div class="strength-text" id="strengthText"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" required minlength="6" autocomplete="new-password" oninput="checkMatch()" />
            <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword', this)" tabindex="-1">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
            <svg class="check-icon" id="matchCheck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary">Tạo tài khoản</button>
      </form>

      <div class="divider"><span>hoặc</span></div>

      <div class="links">
        <a href="login.html">Đã có tài khoản? Đăng nhập</a>
      </div>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:5000";

      function togglePw(id, btn) {
        const input = document.getElementById(id);
        const open = btn.querySelector('.eye-open');
        const closed = btn.querySelector('.eye-closed');
        if (input.type === 'password') {
          input.type = 'text';
          open.style.display = 'none';
          closed.style.display = 'block';
        } else {
          input.type = 'password';
          open.style.display = 'block';
          closed.style.display = 'none';
        }
      }

      function checkStrength(val) {
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
          { w: '0%', c: '', t: '', tc: 'var(--text-muted)' },
          { w: '20%', c: '#f87171', t: 'Rất yếu', tc: '#f87171' },
          { w: '40%', c: '#fb923c', t: 'Yếu', tc: '#fb923c' },
          { w: '60%', c: '#fbbf24', t: 'Trung bình', tc: '#fbbf24' },
          { w: '80%', c: '#34d399', t: 'Mạnh', tc: '#34d399' },
          { w: '100%', c: '#22c55e', t: 'Rất mạnh', tc: '#22c55e' },
        ];

        const l = levels[score];
        fill.style.width = l.w;
        fill.style.background = l.c;
        text.textContent = l.t;
        text.style.color = l.tc;
        checkMatch();
      }

      function checkMatch() {
        const pw = document.getElementById('password').value;
        const cpw = document.getElementById('confirmPassword').value;
        const check = document.getElementById('matchCheck');
        if (cpw && pw === cpw) {
          check.classList.add('show');
        } else {
          check.classList.remove('show');
        }
      }

      function showToast(msg, type) {
        const el = document.getElementById('toast');
        const icon = type === 'error'
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
        el.innerHTML = '<div class="toast ' + type + '">' + icon + '<span>' + msg + '</span></div>';
        setTimeout(function() {
          const toast = el.querySelector('.toast');
          if (toast) {
            toast.classList.add('hide');
            setTimeout(function() { el.innerHTML = ''; }, 300);
          }
        }, 4000);
      }

      document.getElementById("registerForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const submitBtn = document.getElementById("submitBtn");

        if (password !== confirmPassword) {
          showToast("Mật khẩu xác nhận không khớp", "error");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-ring"></span>Đang tạo tài khoản...';

        try {
          const res = await fetch(API_URL + "/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password }),
          });

          const data = await res.json();

          if (data.success) {
            showToast("Tạo tài khoản thành công!", "success");
            setTimeout(function () {
              window.location.href = "login.html";
            }, 1500);
          } else {
            showToast(data.message, "error");
            submitBtn.disabled = false;
            submitBtn.textContent = "Tạo tài khoản";
          }
        } catch (error) {
          showToast("Không thể kết nối đến server", "error");
          submitBtn.disabled = false;
          submitBtn.textContent = "Tạo tài khoản";
        }
      });
    </script>
  </body>
</html>
